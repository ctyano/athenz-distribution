name: Close stale pull requests

on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:

jobs:
  stale:

    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      -
        name: Close stale pull requests
        uses: actions/stale@v10
        with:
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 23
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: 'This PR has had no activity for 23 days. It will be closed in 7 days if there is no comment or update.'
          close-pr-message: 'Closing this PR because it has had no activity for 30 days.'
          exempt-pr-labels: keep-open
