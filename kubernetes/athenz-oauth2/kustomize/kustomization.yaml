---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: athenz

resources:
  - deployment.yaml
  - namespace.yaml
  - service.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
- files:
  - idp.private.pem=keys/idp.private.pem
  name: athenz-idp-keys
  type: Opaque
- files:
  - idp.cert.pem=certs/idp.cert.pem
  name: athenz-idp-certs
  type: Opaque
- files:
  - ca.cert.pem=certs/ca.cert.pem
  name: athenz-cacert
  type: Opaque

configMapGenerator:
  - name: dex-config
    files:
      - config.docker.yaml=dex/config.yaml
  - name: oauth2-envoy-config
    files:
      - envoy.yaml=envoy/config.yaml
  - name: athenz-user-cert-config
    files:
      - config.yaml=athenz-user-cert/config.yaml
